name: Build

on:
  workflow_dispatch: {}
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

env:
  CMAKE_BUILD_TYPE: Release
  CMAKE_POLICY_VERSION_MINIMUM: 3.5
  QT_VERSION: 5.15.2
  QT_MAJOR_VERSION: 5
  PYTHON_VERSION: 3.9
  PYTHON_MAJOR_VERSION: 3
  PYTHON_MINOR_VERSION: 9
  OPENSSL_VERSION: 1.1.1.2100
  PYTHONQT_TAG: v4.0.1

jobs:
  build:
    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (x86_64)
            os: ubuntu-22.04
            arch: x86_64
            qt_arch: gcc_64
            qt_host: linux
            artifact_name: ScreenCloud-Linux-x86_64

          - name: macOS (Intel)
            os: macos-15-intel
            arch: x64
            qt_arch: clang_64
            qt_host: mac
            artifact_name: ScreenCloud-macOS-Intel

          - name: Windows (x64)
            os: windows-2022
            arch: x64
            platform: x64
            qt_arch: win64_msvc2019_64
            qt_host: windows
            artifact_name: ScreenCloud-Windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.21.0"
          ninjaVersion: "^1.0.0"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt_arch }}
          host: ${{ matrix.qt_host }}
          cache: true
          archives: qtbase qttools qtmultimedia qtsvg qtdeclarative qtmultimediawidgets qtopengl qtxmlpatterns qtimageformats qtx11extras icu

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev zlib1g-dev \
            libx11-dev libxcb1-dev libxext-dev libxfixes-dev libxi-dev \
            libxrender-dev libxcb-cursor-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-util-dev libxcb-xfixes0-dev libxcb-xinerama0-dev \
            libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev \
            libfuse2

          pip3 install ssh2-python

      # macOS dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          pip3 install ssh2-python

      # Required on Windows so nmake and cl.exe are available in subsequent bash steps
      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      # Windows dependencies
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install WiX Toolset
          choco install wixtoolset -y

          # Install 7zip
          choco install 7zip

          # Install OpenSSL
          if ("${{ matrix.arch }}" -eq "x86") {
            choco install openssl --version=${{ env.OPENSSL_VERSION }} --x86 -y
          } else {
            choco install openssl --version=${{ env.OPENSSL_VERSION }} -y
          }

          $OPENSSL_ROOT_DIR = Split-Path (Split-Path (Get-Command openssl).Path -Parent) -Parent
          "OPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR" | Out-File -Append -FilePath $env:GITHUB_ENV

          cp "${OPENSSL_ROOT_DIR}/lib/VC/${{ matrix.arch }}/MD/libcrypto.lib" "${OPENSSL_ROOT_DIR}/lib"
          cp "${OPENSSL_ROOT_DIR}/lib/VC/${{ matrix.arch }}/MD/libssl.lib" "${OPENSSL_ROOT_DIR}/lib"

          # Install zlib
          Invoke-WebRequest -Uri "https://www.zlib.net/fossils/zlib-1.3.1.tar.gz" -OutFile "zlib-1.3.1.tar.gz"
          tar -xzf "zlib-1.3.1.tar.gz"
          Set-Location "zlib-1.3.1"
          $ZLIB_BUILD_PATH = (Get-Location).Path
          cmake . -DCMAKE_INSTALL_PREFIX="$ZLIB_BUILD_PATH" -A ${{ matrix.platform }}
          cmake --build . --config Release --target install
          "ZLIB_BASE_DIR=$ZLIB_BUILD_PATH" | Out-File -Append -FilePath $env:GITHUB_ENV
          
          # Add to PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Install Python packages
          py -${{ env.PYTHON_VERSION }} -m pip install --upgrade pip
          py -${{ env.PYTHON_VERSION }} -m pip install ssh2-python

      # Build QuaZip
      - name: Build QuaZip
        shell: bash
        run: |
          git clone https://github.com/stachenov/quazip.git
          cd quazip
          git checkout v1.4
          mkdir -p build
          cd build

          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake .. \
              -G "Visual Studio 17 2022" \
              -A ${{ matrix.platform }} \
              -DCMAKE_PREFIX_PATH="${Qt5_DIR}" \
              -DCMAKE_INSTALL_PREFIX="../install" \
              -DBUILD_SHARED_LIBS=ON \
              -DZLIB_INCLUDE_DIR="${ZLIB_BASE_DIR}/include" \
              -DZLIB_LIBRARY="${ZLIB_BASE_DIR}/lib/zlib.lib"
            cmake --build . --config Release --target install
          else
            cmake .. \
              -G Ninja \
              -DCMAKE_PREFIX_PATH="${Qt5_DIR}" \
              -DCMAKE_INSTALL_PREFIX="../install" \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=ON
            ninja install
          fi

          echo "QUAZIP_DIR=$(pwd)/../install" >> $GITHUB_ENV

      - name: Build PythonQt
        shell: bash
        run: |
          git clone --branch ${{ env.PYTHONQT_TAG }} https://github.com/mevislab/PythonQt
          cd PythonQt

          # Resolve Python paths via sysconfig so they work on all three OSes
          PYTHON_PATH=$(python -c "import sys; print(sys.prefix)")
          PYTHON_LIBRARY_DIR=$(python -c "
          import sysconfig, glob, os
          b = sysconfig.get_config_var('base')
          candidates = [
            sysconfig.get_config_var('LIBPL') or os.path.join(b, 'libs'),
            sysconfig.get_config_var('LIBDIR'),
          ]
          print(next(
            (p for p in candidates
             if p and any(glob.glob(p + '/*' + e) for e in ('.lib', '.so', '.dylib'))),
            ''
          ))")

          # QT_ROOT_DIR is set by jurplel/install-qt-action to the arch-specific Qt root
          # e.g. /home/runner/work/Qt/5.15.2/gcc_64
          QTDIR="${QT_ROOT_DIR}"

          NPROC=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)

          if [ "$RUNNER_OS" == "Windows" ]; then
            # cygpath converts Unix-style paths to Windows-style for qmake/nmake
            PYTHON_PATH_W=$(cygpath -w "${PYTHON_PATH}")
            PYTHON_LIB_W=$(cygpath -w "${PYTHON_LIBRARY_DIR}")
            QTDIR_W=$(cygpath -w "${QTDIR}")
            # Git Bash ships /usr/bin/link which shadows MSVC's link.exe and breaks nmake
            rm -f /usr/bin/link

            # Build the binding generator
            qmake \
              CONFIG+=generator_only CONFIG+=Release \
              PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
              PYTHON_PATH="${PYTHON_PATH_W}" \
              PYTHON_LIB="${PYTHON_LIB_W}" \
              QTDIR="${QTDIR_W}" \
              PythonQt.pro
            nmake

            # Run the generator to produce generated_cpp/
            cd generator
            release/pythonqt_generator.exe qtscript_masterinclude.h build_all.txt
            cd ..

            # Build the full runtime (generator excluded)
            qmake \
              CONFIG+=Release CONFIG+=exclude_generator \
              PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
              PYTHON_PATH="${PYTHON_PATH_W}" \
              PYTHON_LIB="${PYTHON_LIB_W}" \
              QTDIR="${QTDIR_W}" \
              PythonQt.pro
            nmake

          else
            # Fix issues with -lintl on mac os
            if [ "$RUNNER_OS" == "macOS" ]; then
              GETTEXT_LIB="$(brew --prefix gettext)/lib"
              QMAKE_EXTRA_ARGS=(
                "LIBS+=-L${GETTEXT_LIB}"
                "QMAKE_LFLAGS+=-L${GETTEXT_LIB}"
                "LIBS+=-L${PYTHON_LIBRARY_DIR}"
                "QMAKE_LFLAGS+=-L${PYTHON_LIBRARY_DIR}"
                "QMAKE_RPATHDIR+=${PYTHON_LIBRARY_DIR}"
              )
            else
              QMAKE_EXTRA_ARGS=()
            fi

            # Build the binding generator
            qmake \
              CONFIG+=generator_only CONFIG+=Release \
              PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
              PYTHON_PATH="${PYTHON_PATH}" \
              PYTHON_DIR="${PYTHON_PATH}" \
              QTDIR="${QTDIR}" \
              "${QMAKE_EXTRA_ARGS[@]}" \
              PythonQt.pro
            make -j${NPROC}

            # Run the generator to produce generated_cpp/
            cd generator
            ./pythonqt_generator qtscript_masterinclude.h build_all.txt
            cd ..

            # Build the full runtime (generator excluded)
            qmake \
              CONFIG+=Release CONFIG+=exclude_generator \
              PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
              PYTHON_PATH="${PYTHON_PATH}" \
              PYTHON_DIR="${PYTHON_PATH}" \
              QTDIR="${QTDIR}" \
              "${QMAKE_EXTRA_ARGS[@]}" \
              PythonQt.pro
            make -j${NPROC}
          fi

          PYTHONQT_DIR=$(pwd)
          echo "PYTHONQT_DIR=${PYTHONQT_DIR}" >> $GITHUB_ENV

          # Locate the built libraries dynamically so we are not sensitive to
          # mevislab's exact versioned filename (e.g. libPythonQt-Qt5-Python3.9.so).
          if [ "$RUNNER_OS" == "Windows" ]; then
            PYTHONQT_LIB=$(find lib -name "PythonQt*.lib" ! -name "*QtAll*" 2>/dev/null | head -1)
            PYTHONQT_QTALL_LIB=$(find lib -name "PythonQt*QtAll*.lib" 2>/dev/null | head -1)
          elif [ "$RUNNER_OS" == "macOS" ]; then
            PYTHONQT_LIB=$(find lib -name "libPythonQt*.dylib" ! -name "*QtAll*" 2>/dev/null | head -1)
            PYTHONQT_QTALL_LIB=$(find lib -name "libPythonQt*QtAll*.dylib" 2>/dev/null | head -1)
          else
            PYTHONQT_LIB=$(find lib -name "libPythonQt*.so" ! -name "*QtAll*" 2>/dev/null | head -1)
            PYTHONQT_QTALL_LIB=$(find lib -name "libPythonQt*QtAll*.so" 2>/dev/null | head -1)
          fi

          if [ -z "${PYTHONQT_LIB}" ] || [ -z "${PYTHONQT_QTALL_LIB}" ]; then
            echo "ERROR: Could not locate PythonQt libraries under $(pwd)/lib"
            find . -name "libPythonQt*" -o -name "PythonQt*.lib" 2>/dev/null
            exit 1
          fi

          echo "PYTHONQT_LIB=${PYTHONQT_DIR}/${PYTHONQT_LIB}" >> $GITHUB_ENV
          echo "PYTHONQT_QTALL_LIB=${PYTHONQT_DIR}/${PYTHONQT_QTALL_LIB}" >> $GITHUB_ENV

      - name: Build ScreenCloud
        shell: bash
        run: |
          mkdir build
          cd build

          PYTHON_INCLUDE_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          PYTHON_LIBRARY_DIR=$(python -c "import sysconfig,glob,os; b=sysconfig.get_config_var('base'); print(next((p for p in ((sysconfig.get_config_var('LIBPL') or os.path.join(b,'libs')), sysconfig.get_config_var('LIBDIR')) if p and any(glob.glob(p+'/*'+e) for e in ('.lib','.so','.dylib'))), ''))")

          if [ "$RUNNER_OS" == "Windows" ]; then
            PYTHON_DIR=$(python -c "import sys; import os; print(os.path.dirname(sys.executable))")
            cmake .. \
              -G "Visual Studio 17 2022" \
              -A ${{ matrix.platform }} \
              -DCMAKE_PREFIX_PATH="${Qt5_DIR}" \
              -DCMAKE_BUILD_TYPE=Release \
              -DZLIB_ROOT="${ZLIB_BASE_DIR}" \
              -DQUAZIP_INCLUDE_DIR="${QUAZIP_DIR}/include/QuaZip-Qt5-1.4/quazip" \
              -DQUAZIP_LIBRARY="${QUAZIP_DIR}/lib/quazip1-qt5.lib" \
              -DPYTHON_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}" \
              -DPYTHON_LIBRARY="${PYTHON_LIBRARY_DIR}/python${{ env.PYTHON_MAJOR_VERSION }}${{ env.PYTHON_MINOR_VERSION }}.lib" \
              -DPYTHONQT_INCLUDE_DIR="${PYTHONQT_DIR}/src" \
              -DPYTHONQT_LIBRARY="${PYTHONQT_LIB}" \
              -DPYTHONQT_QTALL_INCLUDE_DIR="${PYTHONQT_DIR}/extensions/PythonQt_QtAll" \
              -DPYTHONQT_QTALL_LIBRARY="${PYTHONQT_QTALL_LIB}" \
              -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT_DIR}"
            cmake --build . --config Release

          elif [ "$RUNNER_OS" == "macOS" ]; then
            cmake .. \
              -G Ninja \
              -DCMAKE_PREFIX_PATH="${Qt5_DIR}" \
              -DCMAKE_BUILD_TYPE=Release \
              -DQUAZIP_INCLUDE_DIR="${QUAZIP_DIR}/include/QuaZip-Qt5-1.4/quazip" \
              -DQUAZIP_LIBRARY="${QUAZIP_DIR}/lib/libquazip1-qt5.dylib" \
              -DPYTHON_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}" \
              -DPYTHON_LIBRARY="${PYTHON_LIBRARY_DIR}/libpython${{ env.PYTHON_VERSION }}.dylib" \
              -DPYTHONQT_INCLUDE_DIR="${PYTHONQT_DIR}/src" \
              -DPYTHONQT_LIBRARY="${PYTHONQT_LIB}" \
              -DPYTHONQT_QTALL_INCLUDE_DIR="${PYTHONQT_DIR}/extensions/PythonQt_QtAll" \
              -DPYTHONQT_QTALL_LIBRARY="${PYTHONQT_QTALL_LIB}"
            ninja

          else
            cmake .. \
              -G Ninja \
              -DCMAKE_PREFIX_PATH="${Qt5_DIR}" \
              -DCMAKE_BUILD_TYPE=Release \
              -DQUAZIP_INCLUDE_DIR="${QUAZIP_DIR}/include/QuaZip-Qt5-1.4/quazip" \
              -DQUAZIP_LIBRARY="${QUAZIP_DIR}/lib/libquazip1-qt5.so" \
              -DPYTHON_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}" \
              -DPYTHON_LIBRARY="${PYTHON_LIBRARY_DIR}/libpython${{ env.PYTHON_VERSION }}.so" \
              -DPYTHONQT_INCLUDE_DIR="${PYTHONQT_DIR}/src" \
              -DPYTHONQT_LIBRARY="${PYTHONQT_LIB}" \
              -DPYTHONQT_QTALL_INCLUDE_DIR="${PYTHONQT_DIR}/extensions/PythonQt_QtAll" \
              -DPYTHONQT_QTALL_LIBRARY="${PYTHONQT_QTALL_LIB}"
            ninja
          fi

      # Package Linux (AppImage)
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build
          DESTDIR=appdir cmake --build . --config Release --target install

          # Download linuxdeployqt
          wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-${{ matrix.arch }}.AppImage"
          chmod a+x linuxdeployqt-continuous-${{ matrix.arch }}.AppImage

          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(dirname "${PYTHONQT_LIB}"):$QUAZIP_DIR/lib

          # Create AppImage
          ./linuxdeployqt-continuous-${{ matrix.arch }}.AppImage appdir/usr/local/share/applications/*.desktop \
            -bundle-non-qt-libs \
            -appimage \
            -verbose=2

          rm linuxdeployqt-continuous-${{ matrix.arch }}.AppImage

      # Package macOS
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd build
          cmake --build . --config Release --target install

          # Use macdeployqt
          macdeployqt screencloud.app -dmg -verbose=2

          # Rename DMG
          mv screencloud.dmg ScreenCloud-${GITHUB_SHA::7}.dmg

      # Package Windows
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd build

          # Copy Python dependencies
          PYTHON_DIR=$(python -c "import sys; import os; print(os.path.dirname(sys.executable))")
          cp -r "${PYTHON_DIR}/DLLs" DLLs
          cp -r ${PYTHON_DIR}/Lib/site-packages/ssh2 modules/ssh2
          7z a -tzip -mx=9 python${PYTHON_MAJOR_VERSION}${PYTHON_MINOR_VERSION}.zip ${PYTHON_DIR}/Lib/*

          cmake --build . --config Release --target install

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/*.AppImage
            build/*.dmg
            build/*.msi
          if-no-files-found: error
